name: Gitleaks Baseline  # Name of the workflow (visible in GitHub Actions UI)

# Trigger conditions → when this pipeline should run
on:
  push:
    branches: ["main"]        # Runs when code is pushed to main branch
  pull_request:               # Runs on every PR (before merge)

jobs:
  gitleaks:
    runs-on: ubuntu-latest    # GitHub runner (Linux VM)

    steps:
    # Step 1: Checkout repository code
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0        # IMPORTANT → scans full git history (not just latest commit)

    # Step 2: Run Gitleaks scan using Docker (stable approach)
    - name: Run Gitleaks (Baseline Scan)
      run: |
        docker run --rm \                         # Run container and remove after execution
          -v ${{ github.workspace }}:/repo \      # Mount repo into container
          zricethezav/gitleaks:latest detect \   # Run gitleaks detect command
          --source /repo \                        # Scan the repository path
          --exit-code 1                           # CRITICAL → fail pipeline if leaks are found

        # Explanation:
        # --source /repo → tells gitleaks where to scan
        # --exit-code 1 → enforces security gate (pipeline fails on detection)
        # docker → avoids dependency/version issues in CI
